# ============================================================
# TeamAgent v3.0 — ローカル開発環境
# ============================================================
# 使い方:
#   cd infra/docker
#   docker compose up -d
#
# サービス:
#   - postgres (with pgvector): localhost:5432
#   - adminer (DB GUI): localhost:8080
#   - minio (S3 互換ローカル): localhost:9000 / Console 9001
# ============================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: teamagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: teamagent
      POSTGRES_PASSWORD: teamagent
      POSTGRES_DB: teamagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/01-init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: teamagent-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: teamagent-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: teamagent
      MINIO_ROOT_PASSWORD: teamagent-local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
